<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../dist/output.css">
    <script src="./js/login.js" defer></script>
</head>
<body class="bg-dark-bg text-white font-style">
   <header class="  bg-[#BFC6C4] flex justify-between gap-4 border-b border-primary py-2 px-3">
            <img src="../assets/icons/moviespace-icon.png" alt="MOVIESPACE" class="w-[100px] h-[40px] md:w-auto">
            <div class="flex gap-4 items-center">
                <p class="text-[#202020] text-[10px] md:text-[15px]"><a href="">ALL FILMS</a></p>
                <button class="font-bold rounded-full px-6 py-2 bg-primary font-style text-[#202020]">LOGIN</button>
            </div>
    </header>
    <main class="flex-col items-center min-h-screen flex justify-center ">
        <div class="w-full px-10 md:w-[400px] md:px-0 mx-auto flex flex-col md:gap-6">
        <form id="login-form" action="" method="post">
            <img src="../assets/icons/moviespace-icon.png" alt="Moviespace Logo" class="mx-auto mb-10 h-11">
            <div class="py-[10px]">
                <input id="input-user" type="email"  placeholder="Email"class="bg-transparent w-full outline-none py-2 border-b "  required>
                <p id="error-message-email" class="text-[#FF0000] hidden">Email is not registered, please Sign Up!</p>
            </div>
            <div class="py-[10px]">
                <input id="input-password" type="password" placeholder="Password" class="bg-transparent w-full outline-none py-2 border-b " required>
                <p id="error-message-password" class="text-[#FF0000] hidden">Wrong Password! DUMBASS!</p>
            </div>
            <button class="flex justify-center py-2 font-bold rounded-full mx-auto m-8 w-[120px] h-[40px] bg-primary font-style text-[#202020] hover:bg-[#ffd608] ">LOGIN</button>
            
        </form>
            <p class="font-bold text-[#CE952A] text-center font-style">NEW USER? <a href="./pages/signUp.html" class="hover:text-[#FFD400]">REGISTER HERE</a></p>
        </div>
        
    </main>
</body>
</html>
